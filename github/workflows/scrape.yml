name: Scrape Homes.com Agents

on:
  # Run monthly on the 1st at 2am UTC
  schedule:
    - cron: '0 2 1 * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      city:
        description: 'City to scrape (leave empty for all markets)'
        required: false
        type: string
      state:
        description: 'State (e.g., TX, CA)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ inputs.city }}" ] && [ -n "${{ inputs.state }}" ]; then
            node scraper.js "${{ inputs.city }}" "${{ inputs.state }}"
          else
            node scraper.js
          fi
